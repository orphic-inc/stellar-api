name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stellar
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: stellar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      STELLAR_PSQL_URI: postgresql://stellar:changeme@localhost:5432/stellar
      STELLAR_PSQL_URI_TEST: postgresql://stellar:changeme@localhost:5432/stellar_test
      STELLAR_AUTH_JWT_SECRET: ci-only-not-a-secret-pad-to-32-chars
      STELLAR_HTTP_PORT: 8080
      STELLAR_HTTP_CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npx prettier --check src
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: OpenAPI freshness
        run: npm run openapi:export && git diff --exit-code openapi.json
      - name: Integration tests
        run: npm run test:integration
